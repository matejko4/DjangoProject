<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Fotbalový klub{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #0d1117;
            color: #e6edf3;
            font-family: 'Segoe UI', sans-serif;
        }
        .navbar {
            background-color: #161b22 !important;
            border-bottom: 1px solid #30363d;
        }
        .navbar-brand {
            color: #58a6ff !important;
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: 1px;
        }
        .nav-link {
            color: #8b949e !important;
            transition: color 0.2s;
        }
        .nav-link:hover, .nav-link.active {
            color: #58a6ff !important;
        }
        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            transition: transform 0.2s, border-color 0.2s;
        }
        .card:hover {
            transform: translateY(-3px);
            border-color: #58a6ff;
        }
        .card-title {
            color: #e6edf3;
        }
        .card-text {
            color: #8b949e;
        }
        .badge-pozice {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
        }
        .btn-primary {
            background-color: #1f6feb;
            border-color: #1f6feb;
        }
        .btn-primary:hover {
            background-color: #388bfd;
            border-color: #388bfd;
        }
        .btn-outline-secondary {
            color: #8b949e;
            border-color: #30363d;
        }
        .btn-outline-secondary:hover {
            background-color: #21262d;
            color: #e6edf3;
            border-color: #8b949e;
        }
        .table {
            color: #e6edf3;
        }
        .table thead th {
            background-color: #21262d;
            border-color: #30363d;
            color: #8b949e;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .table tbody td {
            border-color: #21262d;
        }
        .table tbody tr:hover {
            background-color: #21262d;
        }
        .hero {
            background: linear-gradient(135deg, #161b22 0%, #0d1117 100%);
            border-bottom: 1px solid #30363d;
            padding: 3rem 0 2rem;
        }
        .hero h1 {
            color: #e6edf3;
            font-weight: 700;
        }
        .hero p {
            color: #8b949e;
        }
        .stat-box {
            background-color: #21262d;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }
        .stat-box .number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #58a6ff;
        }
        .stat-box .label {
            font-size: 0.8rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        a {
            color: #58a6ff;
            text-decoration: none;
        }
        a:hover {
            color: #388bfd;
        }
        .detail-header {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }
        .detail-label {
            color: #8b949e;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .detail-value {
            color: #e6edf3;
            font-size: 1rem;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="{% url 'seznam_hracu' %}">
            <i class="bi bi-trophy-fill me-2"></i>Fotbalový klub
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'seznam_hracu' %}"><i class="bi bi-people me-1"></i>Hráči</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'seznam_tymu' %}"><i class="bi bi-shield me-1"></i>Týmy</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'seznam_zapasu' %}"><i class="bi bi-calendar3 me-1"></i>Zápasy</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container my-4">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
